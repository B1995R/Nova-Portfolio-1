<h1 class="contact-heading">LET ME TELL YOUR STORIES</h1>

    <div class="contact-wrapper">

            <div class="contact-box"> <!-- inner styled box -->


                <form action="form-handler.php" method="post"> <!-- form submission target -->

                    <label for="first-name">First Name:</label> <!-- label linked to input -->
                    <!-- radio buttons = single choice, checkboxes = multiple choice -->
                    <input type="text" id="first-name" name="first-name" value="First" required> <!-- required field -->

                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" name="last-name" value="Surname" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required> <!-- email validation -->

                    <button type="submit">Submit</button> <!-- form submit button -->

                </form>
